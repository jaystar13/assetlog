version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: assetlog-db
    environment:
      POSTGRES_DB: assetlog
      POSTGRES_USER: assetlog
      POSTGRES_PASSWORD: assetlog_dev
    ports:
      - "5533:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
